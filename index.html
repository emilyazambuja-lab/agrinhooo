<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroTech - Calculadora de Insumos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>AgroTech Solutions</h1>
        <p>Facilitando a vida do homem do campo</p>
    </header>

    <main class="container">
        <h2>Calculadora de Adubo (Milho)</h2>
        <form id="agroForm">
            <div class="form-group">
                <label for="area">Tamanho da Área (em hectares):</label>
                <input type="number" id="area" min="1" required placeholder="Ex: 5">
            </div>
            <button type="submit">Calcular Necessidade</button>
        </form>

        <div id="resultado" class="hidden">
            <h3>Resultado da Análise:</h3>
            <p id="recomendacao"></p>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
